<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | White Water Rafting</title>

    <meta name="description"
      content="Contact White Water Rafting for reservations, questions, and adventure planning. Reach us by phone, email, or our contact form.">
    <meta name="author" content="Emmanuel Sunday Esomojumi">

    <link rel="stylesheet" href="styles/rafting.css">
</head>

<body>

    <!-- HEADER -->
    <header>
        <img src="images/z-crossedoars.jpeg" alt="Rafting Company Logo">

        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About Us</a></li>
                <li><a href="trips.html">Trips</a></li>
                <li><a href="contact.html">Contact Us</a></li>
            </ul>
        </nav>
    </header>

    <!-- MAIN -->
    <main>

        <h1>White Water Rafting Company</h1>
        <p>123 Main River Street<br>
            Kolob, California<br>
            +1 999 999 9999<br>
            info@whitewater.com</p>

        <!-- CONTACT SECTION -->
        <section class="contact-grid">

            <!-- MAP -->
            <div class="map">
                <iframe src="https://www.google.com/maps?q=Kolob,California&output=embed"
                  width="100%" height="250" loading="lazy"></iframe>
            </div>

            <!-- FORM -->
            <form action="#" method="post">
                <label for="name">Name</label>
                <input type="text" id="name" name="name" placeholder="Your name" required>

                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="Your email" required>

                <p>Message Purpose</p>
                <label><input type="radio" id="general" name="purpose" value="general" required>
                    General
                    Inquiry</label>
                <label><input type="radio" id="reservation" name="purpose" value="reservation">
                    Reservation
                    Question</label>
                <label><input type="radio" id="suggestion" name="purpose" value="suggestion">
                    Website
                    Suggestion</label>

                <label for="message">Message</label>
                <textarea id="message" name="message" rows="5" placeholder="Type here"></textarea>

                <label>
                    <input type="checkbox" id="subscribe" name="subscribe"> Please subscribe me to
                    the monthly
                    newsletter
                </label>

                <button type="submit">Get in Touch!</button>
            </form>
        </section>

        <!-- EMPLOYEES -->
        <section>
            <h2>We Are Here to Serve You</h2>

            <div class="employees">
                <figure>
                    <img src="images/guide_manager.jpg" alt="Guide Manager">
                    <figcaption>Emmanuel Sunday - Lead Guide</figcaption>
                </figure>

                <figure>
                    <img src="images/osprey_adult_guide.jpg" alt="Safety Officer">
                    <figcaption>Osprey Adult - Safety Officer</figcaption>
                </figure>

                <figure>
                    <img src="images/customer_support.jpg" alt="Customer Support">
                    <figcaption>Lillie White - Customer Support</figcaption>
                </figure>
            </div>
        </section>

    </main>

    <!-- FOOTER -->
    <footer>
        <p>© 2026 White Water Rafting Co. | Emmanuel Sunday Esomojumi</p>

        <nav class="socialmedia">
            <a href="https://facebook.com">
                <img src="images/facebook.svg" alt="Facebook Icon">
            </a>
            <a href="https://tiktok.com">
                <img src="images/tictok-bw.svg" alt="TikTok Icon">
            </a>
            <a href="https://instagram.com">
                <img src="images/instagram.svg" alt="Instagram Icon">
            </a>
        </nav>
    </footer>

</body>

</html>
