<!DOCTYPE html>
<html lang="en-US">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML & CSS Quiz | WDD 130</title>

    <meta name="description"
      content="Week 05 quiz form for WDD 130 demonstrating HTML form elements and CSS styling.">
    <meta name="author" content="Esomojumi Emmanuel Sunday">

    <link rel="stylesheet" href="styles/quiz.css">
</head>

<body>
    <main>
        <h1>HTML & CSS Quiz</h1>

        <form action="#" method="post">
            <!-- Question 1 -->
            <div class="form-item">
                <label for="q1">1. What does HTML stand for?</label>
                <input type="text" name="q1" id="q1" required>
            </div>

            <!-- Question 2 -->
            <div class="form-item">
                <label for="q2">2. Briefly explain the purpose of CSS.</label>
                <textarea name="q2" id="q2" rows="4" required></textarea>
            </div>

            <!-- Question 3 -->
            <div class="form-item">
                <label for="q3">3. Which HTML tag is used to link a CSS file?</label>
                <select name="q3" id="q3" required>
                    <option value="" selected disabled>Choose One ...</option>
                    <option value="style">&lt;style&gt;</option>
                    <option value="css">&lt;css&gt;</option>
                    <option value="link">&lt;link&gt;</option>
                </select>
            </div>

            <!-- Question 4 -->
            <div class="form-item">
                <label for="q4">4. How many heading levels are available in HTML?</label>
                <input type="number" name="q4" id="q4" min="1" required>
            </div>

            <!-- Submit -->
            <div class="form-item">
                <button type="submit">Submit Quiz</button>
            </div>
        </form>
    </main>
</body>

</html>
